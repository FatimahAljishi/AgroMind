services:
  postgres:
    image: postgres:16
    container_name: agromind-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1993
      POSTGRES_DB: agromind
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: agromind-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: agromind-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: